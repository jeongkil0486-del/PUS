<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>문서 서명 및 관리 시스템</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- JSZip: 원본 .docx XML 직접 수술용 (원본 양식/폰트 100% 보존) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0;
            --danger: #ef4444; --danger-hover: #dc2626;
            --success: #10b981; --success-hover: #059669;
            --warning: #f59e0b; --warning-hover: #d97706;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; display: flex; justify-content: center; align-items: flex-start; }
        .container { width: 100%; max-width: 860px; background: var(--card); border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.10); padding: 28px; margin-top: 16px; margin-bottom: 32px; }
        .screen { display: none; } .screen.active { display: block; }
        h2 { font-size: 21px; text-align: center; color: #0f172a; margin-bottom: 22px; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 14px; color: #374151; }
        .form-group input[type="text"], .form-group input[type="password"] {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 16px; transition: border-color 0.2s; background: #fafafa;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); background: #fff; }
        .btn {
            width: 100%; padding: 12px; background: var(--primary); color: #fff;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            display: flex; justify-content: center; align-items: center; gap: 7px; user-select: none;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover { background: var(--primary-hover); }
        .btn-secondary { background: #64748b; } .btn-secondary:hover { background: #475569; }
        .btn-danger { background: var(--danger); } .btn-danger:hover { background: var(--danger-hover); }
        .btn-success { background: var(--success); } .btn-success:hover { background: var(--success-hover); }
        .btn-warning { background: var(--warning); color: #fff; } .btn-warning:hover { background: var(--warning-hover); }
        .btn:disabled { opacity: 0.42; cursor: not-allowed; }
        .signature-wrapper { border: 2px dashed var(--border); border-radius: 10px; background: #fff; position: relative; margin-bottom: 12px; touch-action: none; }
        canvas { width: 100%; height: 200px; display: block; border-radius: 10px; }
        .signature-tools { display: flex; gap: 10px; margin-bottom: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .section-block { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .section-label { font-weight: 700; font-size: 14px; margin-bottom: 10px; color: #1e293b; display: flex; align-items: center; gap: 6px; }
        .file-upload-box { border: 2px dashed var(--primary); padding: 22px; text-align: center; border-radius: 10px; background: #f0f2ff; cursor: pointer; transition: background 0.2s; }
        .file-upload-box:hover { background: #e8eaff; }
        .preview-section { margin-top: 14px; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; }
        .preview-toolbar { background: #f8fafc; border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #475569; flex-wrap: wrap; }
        .preview-toolbar i { color: var(--primary); }
        #docPreviewArea { padding: 20px 24px; max-height: 500px; overflow-y: auto; position: relative; }
        #docPreviewArea table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        #docPreviewArea td, #docPreviewArea th { border: 1px solid #cbd5e1; padding: 6px 10px; min-width: 50px; vertical-align: middle; font-size: 13px; }
        #docPreviewArea p { margin: 3px 0; font-size: 13px; line-height: 1.5; }
        #docPreviewArea h1, #docPreviewArea h2, #docPreviewArea h3 { margin: 8px 0 5px; }
        .cell-sig-target { cursor: pointer; transition: background 0.15s; }
        .cell-sig-target:hover { background: #eff6ff !important; outline: 1px dashed var(--primary); }
        .cell-sig-target.selected { background: #dbeafe !important; outline: 2px solid var(--primary); }
        .cell-name-target { background: #f0fdf4 !important; outline: 1px dashed #10b981; }
        .preview-badge {
            display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px;
            border-radius: 3px; vertical-align: middle; white-space: nowrap;
        }
        .badge-sig  { background: #dbeafe; color: #1d4ed8; }
        .badge-name { background: #d1fae5; color: #065f46; }
        .badge-date { background: #ede9fe; color: #5b21b6; }
        .cell-date-target { background: #f5f3ff !important; outline: 1px dashed #7c3aed; }
        .insert-guide { background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8; padding: 9px 14px; border-radius: 8px; font-size: 13px; margin: 0 14px 14px; display: flex; align-items: flex-start; gap: 7px; }
        .control-box { display: flex; gap: 8px; align-items: center; width: 100%; }
        .control-box input[type="text"] { width: 180px; height: 44px; padding: 0 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; background: #fafafa; }
        .control-box input[type="text"]:focus { outline: none; border-color: var(--primary); }
        .btn-group-layout { display: flex; gap: 6px; flex: 1; }
        .btn-group-layout .btn { height: 44px; padding: 0 12px; white-space: nowrap; font-size: 14px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; margin-top: 12px; }
        .employee-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; background: #fafcff; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; transition: box-shadow 0.2s; }
        .employee-card:hover { box-shadow: 0 4px 14px rgba(79,70,229,0.10); }
        .card-checkbox-wrapper { position: absolute; top: 12px; left: 12px; z-index: 10; }
        .card-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
        .employee-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: #1e293b; padding-left: 18px; }
        .sig-status-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; }
        .sig-status-badge.done { background: #d1fae5; color: #065f46; }
        .sig-status-badge.pending { background: #fee2e2; color: #991b1b; }
        .saved-signature-box { width: 100%; height: 76px; border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 8px; }
        .saved-signature-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .no-signature { font-size: 12px; color: #94a3b8; font-style: italic; }
        .action-container { display: flex; gap: 6px; margin-top: 6px; }
        .batch-action-bar { background: #f8fafc; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
        .batch-action-bar .btn { flex: 1; min-width: 160px; }
        .locked-msg { display: none; background: #fee2e2; color: #b91c1c; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 700; text-align: center; border: 1px solid #fca5a5; }
        .spinner { display: none; text-align: center; padding: 12px; color: var(--primary); font-size: 14px; }
        @media (max-width: 600px) {
            .container { padding: 16px; margin-top: 0; }
            h2 { font-size: 18px; }
            .admin-grid { grid-template-columns: 1fr; }
            .control-box { flex-wrap: wrap; }
            .control-box input[type="text"] { width: 100%; }
            .btn-group-layout { flex-wrap: wrap; }
            .batch-action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 로그인 -->
    <div id="loginScreen" class="screen active">
        <h2>시스템 로그인</h2>
        <div class="form-group"><label>이름</label><input type="text" id="loginId" placeholder="이름을 입력하세요"></div>
        <div class="form-group"><label>비밀번호 (PW)</label><input type="password" id="loginPw" placeholder="비밀번호를 입력하세요"></div>
        <button class="btn" onclick="handleLogin()"><i class="fa-solid fa-sign-in-alt"></i> 로그인</button>
    </div>

    <!-- 직원 화면 -->
    <div id="userScreen" class="screen">
        <div class="admin-header">
            <h2 id="welcomeMessage" style="text-align:left;margin-bottom:0;font-size:18px;"></h2>
            <button class="btn btn-secondary" style="width:auto;padding:6px 14px;font-size:13px;" onclick="logout()">로그아웃</button>
        </div>
        <div id="lockNotification" class="locked-msg"><i class="fa-solid fa-lock"></i> 서명이 이미 제출되었습니다. 재작성이 필요하시면 관리자에게 요청하세요.</div>
        <div class="form-group">
            <label>스마트폰 손 서명 (아래 사각형 안에 그리세요)</label>
            <div class="signature-wrapper" id="canvasFrame"><canvas id="signatureCanvas"></canvas></div>
            <div class="signature-tools"><button id="btnClear" class="btn btn-secondary" onclick="clearSignature()"><i class="fa-solid fa-eraser"></i> 지우기</button></div>
        </div>
        <button id="btnSubmit" class="btn" onclick="submitSignature()"><i class="fa-solid fa-paper-plane"></i> 서명 제출하기</button>
    </div>

    <!-- 관리자 화면 -->
    <div id="adminScreen" class="screen">
        <div class="admin-header">
            <h2 style="margin-bottom:0;text-align:left;"><i class="fa-solid fa-user-shield"></i> 관리자 모드</h2>
            <button class="btn btn-secondary" style="width:auto;padding:6px 14px;font-size:13px;" onclick="logout()">로그아웃</button>
        </div>

        <!-- 1. 양식 등록 & 미리보기 -->
        <div class="section-block">
            <div class="section-label"><i class="fa-solid fa-file-word" style="color:var(--primary)"></i> 1. 기본 Word 양식 등록 (.docx)</div>
            <div class="file-upload-box" onclick="document.getElementById('wordUpload').click()">
                <i class="fa-solid fa-file-word" style="font-size:28px;color:var(--primary);margin-bottom:8px;display:block;"></i>
                <p id="uploadStatus" style="font-size:14px;color:#64748b;">클릭하여 Word 양식 파일 업로드</p>
                <input type="file" id="wordUpload" accept=".docx" style="display:none;" onchange="handleFileTemplate(event)">
            </div>
            <div id="spinnerPreview" class="spinner"><i class="fa-solid fa-spinner fa-spin"></i> 미리보기 변환 중...</div>
            <div id="previewSection" class="preview-section" style="display:none;">
                <div class="preview-toolbar">
                    <i class="fa-solid fa-eye"></i>
                    <strong>양식 미리보기</strong>
                    <span id="previewFileName" style="color:#94a3b8;font-size:12px;"></span>
                    <span style="margin-left:auto;font-size:11px;color:#94a3b8;">※ <strong style="color:var(--primary)">서명이 들어갈 셀</strong>을 클릭하세요 → 왼쪽 셀에 이름, 클릭 셀부터 서명 순차 삽입</span>
                </div>
                <div id="docPreviewArea"></div>
                <div id="insertGuide" class="insert-guide" style="display:none;">
                    <i class="fa-solid fa-circle-info" style="margin-top:2px;flex-shrink:0;"></i>
                    <span id="insertGuideText"></span>
                </div>
            </div>
        </div>

        <!-- 2. 직원 계정 제어 -->
        <div class="section-block">
            <div class="section-label"><i class="fa-solid fa-users-gear" style="color:var(--primary)"></i> 2. 직원 계정 제어 및 비밀번호 초기화</div>
            <div class="control-box">
                <input type="text" id="targetEmpId" placeholder="이름 입력 (예: 홍길동)">
                <div class="btn-group-layout">
                    <button class="btn" onclick="createEmployeeAccountDirect()"><i class="fa-solid fa-user-plus"></i> 생성</button>
                    <button class="btn btn-danger" onclick="deleteEmployeeAccountDirect()"><i class="fa-solid fa-user-minus"></i> 삭제</button>
                    <button class="btn btn-warning" onclick="resetEmployeePasswordDirect()"><i class="fa-solid fa-key"></i> 초기화</button>
                </div>
            </div>
        </div>

        <!-- 3. 직원별 서명 현황 -->
        <div>
            <div class="section-label"><i class="fa-solid fa-pen-nib" style="color:var(--primary)"></i> 3. 직원별 서명 현황 (체크하여 일괄 제어)</div>

            <!-- 검색창 -->
            <div style="position:relative;margin-bottom:12px;">
                <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;"></i>
                <input type="text" id="searchEmp" placeholder="이름 검색..." oninput="filterCards(this.value)"
                    style="width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:#fafafa;outline:none;transition:border-color .2s;"
                    onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'">
            </div>

            <!-- 전체 선택 + 카운트 -->
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-weight:600;color:#374151;">
                    <input type="checkbox" id="checkAll" onchange="toggleAllCards(this)" style="width:16px;height:16px;accent-color:var(--primary);">
                    전체 선택
                </label>
                <span id="selectedCount" style="font-size:13px;color:var(--muted);"></span>
            </div>

            <!-- 일괄 처리 버튼 -->
            <div class="batch-action-bar">
                <button class="btn btn-success" id="btnDownload" onclick="downloadCheckedEmployeesDocument()">
                    <i class="fa-solid fa-file-import"></i> 적용 및 다운로드
                </button>
                <button class="btn btn-danger" onclick="deleteCheckedEmployees()">
                    <i class="fa-solid fa-trash-can"></i> 명단 일괄 삭제
                </button>
                <button class="btn btn-warning" onclick="resetAllSignatures()">
                    <i class="fa-solid fa-arrow-rotate-left"></i> 전체 서명 초기화
                </button>
            </div>
            <div id="spinnerDownload" class="spinner"><i class="fa-solid fa-spinner fa-spin"></i> 문서 생성 중... 잠시 기다려 주세요</div>
            <div class="admin-grid" id="adminGrid"></div>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   Firebase
═══════════════════════════════════════════════ */
const firebaseConfig = {
    apiKey: "AIzaSyDlcAR1IJ-GM_13wH8XTd2BhVcvs9fZGd8",
    authDomain: "fltinfo.firebaseapp.com",
    databaseURL: "https://fltinfo-default-rtdb.firebaseio.com",
    projectId: "fltinfo",
    storageBucket: "fltinfo.firebasestorage.app",
    messagingSenderId: "77715217220",
    appId: "1:77715217220:web:8f940ae71f01e068ef9511"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

/* ═══════════════════════════════════════════════
   전역 상태
═══════════════════════════════════════════════ */
let signaturePad;
let currentUser      = null;
let globalUsersData  = {};
let uploadedTemplateArrayBuffer = null;
let uploadedTemplateFileName    = '';
let insertPosition   = null; // { tableIdx, rowIdx, colIdx }

/* ═══════════════════════════════════════════════
   IndexedDB — 관리자 설정 영속화 (새로고침 후에도 유지)
   저장 항목: docx ArrayBuffer, 파일명, 삽입 위치
═══════════════════════════════════════════════ */
const IDB_NAME = 'pussign_admin';
const IDB_STORE = 'settings';
let _idb = null;

function openIDB() {
    return new Promise((resolve, reject) => {
        if (_idb) { resolve(_idb); return; }
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
        req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
        req.onerror   = e => reject(e.target.error);
    });
}
async function idbSet(key, val) {
    const db = await openIDB();
    return new Promise((res, rej) => {
        const r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(val, key);
        r.onsuccess = () => res();
        r.onerror   = e  => rej(e.target.error);
    });
}
async function idbGet(key) {
    const db = await openIDB();
    return new Promise((res, rej) => {
        const r = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
        r.onsuccess = e => res(e.target.result ?? null);
        r.onerror   = e => rej(e.target.error);
    });
}
async function idbDel(key) {
    const db = await openIDB();
    return new Promise((res, rej) => {
        const r = db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(key);
        r.onsuccess = () => res();
        r.onerror   = e => rej(e.target.error);
    });
}

/* 관리자 설정 저장 */
async function saveAdminSettings() {
    try {
        if (uploadedTemplateArrayBuffer) {
            await idbSet('templateBuffer',   uploadedTemplateArrayBuffer);
            await idbSet('templateFileName', uploadedTemplateFileName);
        }
        if (insertPosition) await idbSet('insertPosition', insertPosition);
        else                await idbDel('insertPosition');
    } catch(e) { console.warn('IDB save:', e); }
}

/* 관리자 로그인 시 저장된 설정 복구 */
async function restoreAdminSettings() {
    try {
        const buf  = await idbGet('templateBuffer');
        const name = await idbGet('templateFileName');
        const pos  = await idbGet('insertPosition');
        if (!buf) return;

        uploadedTemplateArrayBuffer = buf;
        uploadedTemplateFileName    = name || '저장된 양식';
        document.getElementById('uploadStatus').innerText = `양식 등록 완료: ${uploadedTemplateFileName}`;
        document.getElementById('uploadStatus').style.color = '#059669';
        document.getElementById('previewFileName').innerText = `(${uploadedTemplateFileName})`;
        document.getElementById('spinnerPreview').style.display = 'block';

        mammoth.convertToHtml({ arrayBuffer: buf.slice() })
            .then(result => {
                document.getElementById('spinnerPreview').style.display = 'none';
                const area = document.getElementById('docPreviewArea');
                area.innerHTML = result.value;
                document.getElementById('previewSection').style.display = 'block';
                attachCellClickEvents(area);
                if (pos) {
                    insertPosition = pos;
                    const tables = area.querySelectorAll('table');
                    onCellClick(area, tables, pos.tableIdx, pos.rowIdx, pos.colIdx);
                }
            })
            .catch(() => { document.getElementById('spinnerPreview').style.display = 'none'; });
    } catch(e) { console.warn('IDB restore:', e); }
}

/* ═══════════════════════════════════════════════
   초기화
═══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
    initSignaturePad();
    setupCanvasResize();
    listenToRealtimeDatabase();
});

function initSignaturePad() {
    const canvas = document.getElementById('signatureCanvas');
    signaturePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255,255,255)', penColor: 'rgb(0,0,0)' });
}

function setupCanvasResize() {
    const canvas = document.getElementById('signatureCanvas');
    function resize() {
        const r = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width  = canvas.offsetWidth  * r;
        canvas.height = canvas.offsetHeight * r;
        canvas.getContext('2d').scale(r, r);
        if (signaturePad) signaturePad.clear();
    }
    window.addEventListener('resize', resize);
    setTimeout(resize, 300);
}

function clearSignature() { if (signaturePad && !signaturePad.disabled) signaturePad.clear(); }

/* ═══════════════════════════════════════════════
   Firebase 리스너
═══════════════════════════════════════════════ */
function listenToRealtimeDatabase() {
    database.ref('users').on('value', snap => {
        const raw = snap.val() || {};
        // name 필드가 없거나 undefined인 경우 key(userId)로 자동 보정
        globalUsersData = {};
        Object.keys(raw).forEach(id => {
            globalUsersData[id] = { ...raw[id], name: raw[id].name || id };
            // Firebase에 name이 누락된 경우 자동 복구
            if (!raw[id].name) database.ref('users/' + id).update({ name: id });
        });
        if (!currentUser) {
            checkSessionStorageLogin();
        } else {
            if (currentUser.role !== 'admin' && globalUsersData[currentUser.id]) {
                currentUser = { id: currentUser.id, ...globalUsersData[currentUser.id] };
                checkUserSignatureLockState();
            }
            if (document.getElementById('adminScreen').classList.contains('active')) renderAdminGrid();
        }
    });
}

/* ═══════════════════════════════════════════════
   세션 복구
═══════════════════════════════════════════════ */
function checkSessionStorageLogin() {
    const saved = sessionStorage.getItem('pussign_user_session');
    if (!saved) return;
    const u = JSON.parse(saved);
    if (u.id === 'PUSSIGN') {
        currentUser = u; switchScreen('adminScreen'); renderAdminGrid(); restoreAdminSettings();
    } else if (globalUsersData[u.id]) {
        currentUser = { id: u.id, ...globalUsersData[u.id] };
        switchScreen('userScreen');
        document.getElementById('welcomeMessage').innerText = currentUser.name;
        checkUserSignatureLockState();
        setTimeout(() => window.dispatchEvent(new Event('resize')), 200);
    }
}

function switchScreen(id) {
    ['loginScreen','userScreen','adminScreen'].forEach(s => document.getElementById(s).classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════════════
   서명 잠금
═══════════════════════════════════════════════ */
function checkUserSignatureLockState() {
    const locked = currentUser.signature && currentUser.signature !== '';
    document.getElementById('lockNotification').style.display = locked ? 'block' : 'none';
    document.getElementById('btnClear').disabled  = locked;
    document.getElementById('btnSubmit').disabled = locked;
    if (signaturePad) { locked ? signaturePad.off() : (signaturePad.on(), signaturePad.clear()); }
}

/* ═══════════════════════════════════════════════
   로그인 / 로그아웃
═══════════════════════════════════════════════ */
function handleLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('loginPw').value.trim();
    if (!id || !pw) { alert('이름과 비밀번호를 모두 입력해 주세요.'); return; }
    if (id === 'PUSSIGN' && pw === 'PUSSIGN') {
        currentUser = { id: 'PUSSIGN', name: '최고관리자', role: 'admin' };
        sessionStorage.setItem('pussign_user_session', JSON.stringify(currentUser));
        switchScreen('adminScreen'); renderAdminGrid(); restoreAdminSettings(); return;
    }
    const rec = globalUsersData[id];
    if (!rec) { alert('정보가 일치하지 않습니다.'); return; }
    if (!rec.pw || rec.pw === '') {
        database.ref('users/' + id).update({ pw }).then(() => {
            alert('입력하신 비밀번호가 초기 비밀번호로 자동 지정됩니다.');
            currentUser = { id, ...rec, pw };
            sessionStorage.setItem('pussign_user_session', JSON.stringify(currentUser));
            proceedUserLogin(currentUser);
        });
    } else {
        if (rec.pw === pw) {
            currentUser = { id, ...rec };
            sessionStorage.setItem('pussign_user_session', JSON.stringify(currentUser));
            proceedUserLogin(currentUser);
        } else { alert('정보가 일치하지 않습니다.'); }
    }
}

function proceedUserLogin(r) {
    switchScreen('userScreen');
    document.getElementById('welcomeMessage').innerText = r.name;
    checkUserSignatureLockState();
    setTimeout(() => window.dispatchEvent(new Event('resize')), 200);
}

function logout() {
    currentUser = null;
    sessionStorage.removeItem('pussign_user_session');
    document.getElementById('loginId').value = '';
    document.getElementById('loginPw').value = '';
    switchScreen('loginScreen');
}

/* ═══════════════════════════════════════════════
   직원 계정 CRUD
═══════════════════════════════════════════════ */
function createEmployeeAccountDirect() {
    const name = document.getElementById('targetEmpId').value.trim();
    if (!name) { alert('생성할 대상의 이름을 입력해 주세요.'); return; }
    if (globalUsersData[name] || name === 'PUSSIGN') { alert('이미 존재하는 이름입니다.'); return; }
    database.ref('users/' + name).set({ pw:'', name, role:'user', signature:'', timestamp:'' })
        .then(() => { alert('생성되었습니다.'); document.getElementById('targetEmpId').value = ''; });
}
function deleteEmployeeAccountDirect() {
    const name = document.getElementById('targetEmpId').value.trim();
    if (!name) { alert('삭제할 사람의 이름을 입력창에 적어주세요.'); return; }
    if (!globalUsersData[name]) { alert('존재하지 않는 이름입니다.'); return; }
    if (confirm(`정말로 [${name}] 계정을 완전히 삭제하시겠습니까?`))
        database.ref('users/' + name).remove().then(() => { alert('삭제되었습니다.'); document.getElementById('targetEmpId').value = ''; });
}
function resetEmployeePasswordDirect() {
    const name = document.getElementById('targetEmpId').value.trim();
    if (!name) { alert('비밀번호를 리셋할 사람의 이름을 입력창에 적어주세요.'); return; }
    if (!globalUsersData[name]) { alert('등록되지 않은 이름입니다.'); return; }
    if (confirm(`[${name}]의 비밀번호를 초기화하시겠습니까?`))
        database.ref('users/' + name).update({ pw:'' }).then(() => { alert('초기화되었습니다.'); document.getElementById('targetEmpId').value = ''; });

/* ═══════════════════════════════════════════════
   서명 제출
═══════════════════════════════════════════════ */
function submitSignature() {
    if (signaturePad.isEmpty()) { alert('서명란에 손 서명을 작성해 주세요.'); return; }
    database.ref('users/' + currentUser.id).update({ signature: signaturePad.toDataURL(), timestamp: Date.now() })
        .then(() => alert('서명이 전송되어 제출이 완결되었습니다.'));
}

/* ═══════════════════════════════════════════════
   전체 선택 / 카운트
═══════════════════════════════════════════════ */
function toggleAllCards(masterChk) {
    document.querySelectorAll('.employee-card').forEach(card => {
        if (card.style.display === 'none') return;
        const chk = card.querySelector('.card-checkbox');
        if (chk) chk.checked = masterChk.checked;
    });
    updateSelectedCount();
    refreshPreviewBadges();
}
function updateSelectedCount() {
    const total   = document.querySelectorAll('.card-checkbox:not([style*="display:none"])').length;
    const checked = document.querySelectorAll('.card-checkbox:checked').length;
    document.getElementById('selectedCount').textContent = checked > 0 ? `${checked} / ${total}명 선택됨` : '';
}

/* 이름 검색 필터 */
function filterCards(keyword) {
    const kw = keyword.trim().toLowerCase();
    document.querySelectorAll('.employee-card').forEach(card => {
        const name = (card.querySelector('.employee-name') || {}).innerText || '';
        card.style.display = (!kw || name.toLowerCase().includes(kw)) ? '' : 'none';
    });
    // 전체선택 체크박스 상태 동기화
    const master = document.getElementById('checkAll');
    if (master) master.checked = false;
    updateSelectedCount();
}

/* 전체 서명 초기화 */
function resetAllSignatures() {
    const signedUsers = Object.keys(globalUsersData)
        .filter(id => globalUsersData[id].role !== 'admin' && globalUsersData[id].signature && globalUsersData[id].signature !== '');
    if (!signedUsers.length) { alert('초기화할 서명이 없습니다.'); return; }
    if (!confirm(`서명을 완료한 ${signedUsers.length}명의 서명을 전부 초기화하시겠습니까?\n(직원 계정은 삭제되지 않으며, 서명만 삭제됩니다)`)) return;
    Promise.all(signedUsers.map(id => database.ref('users/' + id).update({ signature:'', timestamp:'' })))
        .then(() => alert(`${signedUsers.length}명의 서명이 모두 초기화되었습니다.`));
}

/* ═══════════════════════════════════════════════
   관리자 그리드 렌더링
═══════════════════════════════════════════════ */
function renderAdminGrid() {
    const grid = document.getElementById('adminGrid');
    grid.innerHTML = '';
    const master = document.getElementById('checkAll');
    if (master) master.checked = false;

    const users = Object.keys(globalUsersData)
        .filter(id => globalUsersData[id].role !== 'admin')
        .sort((a,b) => a.localeCompare(b,'ko'));

    if (!users.length) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:20px;">등록된 직원이 없습니다.</p>';
        return;
    }

    users.forEach(userId => {
        const user  = globalUsersData[userId];
        if (!user.name) user.name = userId; // 방어적 폴백
        const hasSig = user.signature && user.signature !== '';

        const card = document.createElement('div');
        card.className = 'employee-card';

        /* 체크박스 */
        const cw  = document.createElement('div'); cw.className = 'card-checkbox-wrapper';
        const chk = document.createElement('input');
        chk.type = 'checkbox'; chk.className = 'card-checkbox'; chk.value = userId;
        chk.addEventListener('change', () => {
            updateSelectedCount();
            refreshPreviewBadges();  // 체크 변경 시 미리보기 배지 자동 갱신
        });
        cw.appendChild(chk);

        /* 이름 */
        const nameDiv = document.createElement('div');
        nameDiv.className = 'employee-name'; nameDiv.innerText = user.name;

        /* 상태 뱃지 */
        const badge = document.createElement('span');
        badge.className = 'sig-status-badge ' + (hasSig ? 'done' : 'pending');
        badge.innerText = hasSig ? '✓ 서명 완료' : '미제출';

        /* 서명 박스 */
        const sigBox = document.createElement('div'); sigBox.className = 'saved-signature-box';
        if (hasSig) {
            const img = document.createElement('img'); img.src = user.signature; sigBox.appendChild(img);
        } else { sigBox.innerHTML = '<span class="no-signature">서명 미제출</span>'; }

        /* 타임스탬프 */
        const tsDiv = document.createElement('div');
        tsDiv.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:6px;';
        if (hasSig && user.timestamp) {
            const d = new Date(user.timestamp);
            tsDiv.innerText = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        /* 초기화 버튼 */
        const ac = document.createElement('div'); ac.className = 'action-container';
        const resetBtn = document.createElement('button');
        resetBtn.className = 'btn btn-warning';
        resetBtn.style.cssText = 'padding:7px;font-size:12px;flex:1;';
        resetBtn.innerHTML = '<i class="fa-solid fa-arrow-rotate-left"></i> 서명 초기화';
        resetBtn.addEventListener('click', () => {
            if (confirm(`[${user.name}] 직원이 서명을 다시 작성할 수 있도록 초기화하시겠습니까?`))
                database.ref('users/' + userId).update({ signature:'', timestamp:'' })
                    .then(() => alert('초기화되었습니다.'));
        });
        ac.appendChild(resetBtn);

        card.appendChild(cw); card.appendChild(nameDiv); card.appendChild(badge);
        card.appendChild(sigBox); card.appendChild(tsDiv); card.appendChild(ac);
        grid.appendChild(card);
    });
    // 실시간 업데이트 후에도 검색 필터 유지
    const kw = (document.getElementById('searchEmp') || {}).value || '';
    if (kw) filterCards(kw);
    updateSelectedCount();
}

/* ═══════════════════════════════════════════════
   양식 파일 등록 + mammoth 미리보기
═══════════════════════════════════════════════ */
function handleFileTemplate(e) {
    const file = e.target.files[0];
    if (!file) return;
    insertPosition = null;
    uploadedTemplateFileName = file.name;

    document.getElementById('uploadStatus').innerText = `양식 등록 완료: ${file.name}`;
    document.getElementById('uploadStatus').style.color = '#059669';
    document.getElementById('previewFileName').innerText = `(${file.name})`;
    document.getElementById('spinnerPreview').style.display = 'block';
    document.getElementById('previewSection').style.display = 'none';

    const reader = new FileReader();
    reader.onload = ev => {
        uploadedTemplateArrayBuffer = ev.target.result.slice(); // 원본 보존

        // mammoth로 HTML 미리보기 변환 (별도 ArrayBuffer 사용)
        mammoth.convertToHtml({ arrayBuffer: ev.target.result })
            .then(result => {
                document.getElementById('spinnerPreview').style.display = 'none';
                const area = document.getElementById('docPreviewArea');
                area.innerHTML = result.value;
                document.getElementById('previewSection').style.display = 'block';
                document.getElementById('insertGuide').style.display = 'none';
                attachCellClickEvents(area);
                saveAdminSettings();
            })
            .catch(err => {
                document.getElementById('spinnerPreview').style.display = 'none';
                document.getElementById('docPreviewArea').innerHTML = `<p style="color:red;padding:16px;">미리보기 변환 실패: ${err.message}</p>`;
                document.getElementById('previewSection').style.display = 'block';
            });
    };
    reader.readAsArrayBuffer(file);
}

/* ═══════════════════════════════════════════════
   셀 클릭 이벤트 부착
═══════════════════════════════════════════════ */
function attachCellClickEvents(area) {
    const tables = area.querySelectorAll('table');
    tables.forEach((table, tIdx) => {
        const rows = table.querySelectorAll('tr');
        rows.forEach((row, rIdx) => {
            const cells = row.querySelectorAll('td, th');
            cells.forEach((cell, cIdx) => {
                cell.classList.add('cell-sig-target');
                cell.title = '이 셀부터 서명 순차 삽입 (왼쪽 셀에 이름 자동 기입)';
                cell.addEventListener('click', () => onCellClick(area, tables, tIdx, rIdx, cIdx));
            });
        });
    });
}

function onCellClick(area, tables, tIdx, rIdx, cIdx) {
    const table = tables[tIdx];
    const rows  = table.querySelectorAll('tr');
    const targetCell = rows[rIdx].querySelectorAll('td, th')[cIdx];

    // ── 같은 셀 재클릭 → 선택 취소(toggle) ──
    const isSameCell = insertPosition &&
        insertPosition.tableIdx === tIdx &&
        insertPosition.rowIdx   === rIdx &&
        insertPosition.colIdx   === cIdx;

    clearPreviewMarkers(area);

    if (isSameCell) {
        // 선택 취소
        insertPosition = null;
        saveAdminSettings();
        document.getElementById('insertGuide').style.display = 'none';
        return;
    }

    // ── 새 셀 선택 ──
    targetCell.classList.add('selected');
    insertPosition = { tableIdx: tIdx, rowIdx: rIdx, colIdx: cIdx };
    saveAdminSettings();

    // 체크된 직원 중 서명 완료자 — timestamp(일자) 오름차순
    const checkedIds = Array.from(document.querySelectorAll('.card-checkbox:checked')).map(c => c.value);
    let previewUsers;
    if (checkedIds.length > 0) {
        previewUsers = checkedIds
            .map(id => globalUsersData[id])
            .filter(u => u && u.signature && u.signature !== '')
            .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    } else {
        // 체크 없으면 서명 완료 전체 (timestamp 순)
        previewUsers = Object.values(globalUsersData)
            .filter(u => u.role !== 'admin' && u.signature && u.signature !== '')
            .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    }

    // ── 행 단위 순차 배치: colIdx 고정, rowIdx만 증가 ──
    let queue = [...previewUsers];
    for (let r = rIdx; r < rows.length && queue.length; r++) {
        const rowCells = rows[r].querySelectorAll('td, th');
        if (cIdx >= rowCells.length) continue;   // 해당 행에 그 열이 없으면 건너뜀

        const user    = queue.shift();
        const sigCell = rowCells[cIdx];

        // 서명 셀 마커
        const sigBadge = document.createElement('span');
        sigBadge.className = 'preview-badge badge-sig';
        sigBadge.innerText = r === rIdx ? `▶ ${user.name} 서명` : `↳ ${user.name} 서명`;
        sigCell.prepend(sigBadge);

        // 왼쪽 이름 셀
        if (cIdx > 0 && rowCells[cIdx - 1]) {
            const nameCell = rowCells[cIdx - 1];
            nameCell.classList.add('cell-name-target');
            const nb = document.createElement('span');
            nb.className = 'preview-badge badge-name';
            nb.innerText = `✎ ${user.name}`;
            nameCell.prepend(nb);
        }

        // 오른쪽 날짜 셀
        if (cIdx + 1 < rowCells.length && rowCells[cIdx + 1]) {
            const dateCell = rowCells[cIdx + 1];
            dateCell.classList.add('cell-date-target');
            const d = user.timestamp ? new Date(user.timestamp) : new Date();
            const db2 = document.createElement('span');
            db2.className = 'preview-badge badge-date';
            db2.innerText = `📅 ${d.getMonth()+1}/${d.getDate()}`;
            dateCell.prepend(db2);
        }
    }

    // 안내 메시지
    const used = previewUsers.length - queue.length;
    document.getElementById('insertGuide').style.display = 'flex';
    document.getElementById('insertGuideText').innerHTML =
        `<b>${rIdx+1}행 ${cIdx+1}열</b>부터 아래로 한 행씩 순차 삽입됩니다 (${used}명 미리보기).<br>
        <span style="color:#059669;">● 초록</span>: 이름 &nbsp;
        <span style="color:#1d4ed8;">● 파랑</span>: 서명 &nbsp;
        <span style="color:#7c3aed;">● 보라</span>: 날짜(M/D) &nbsp;
        ※ 정렬기준: 서명 작성일 오름차순`;
}

/* 미리보기 마커 전체 초기화 헬퍼 */
function clearPreviewMarkers(area) {
    area.querySelectorAll('.cell-sig-target').forEach(c => c.classList.remove('selected'));
    area.querySelectorAll('.cell-name-target').forEach(c => c.classList.remove('cell-name-target'));
    area.querySelectorAll('.cell-date-target').forEach(c => c.classList.remove('cell-date-target'));
    area.querySelectorAll('.preview-badge').forEach(b => b.remove());
}

/* 체크 변경 시 현재 삽입 위치 기준으로 미리보기 배지 재렌더 */
function refreshPreviewBadges() {
    if (!insertPosition) return;
    const area   = document.getElementById('docPreviewArea');
    const tables = area.querySelectorAll('table');
    if (!tables.length) return;
    onCellClick(area, tables, insertPosition.tableIdx, insertPosition.rowIdx, insertPosition.colIdx);
}

   다운로드 진입점
═══════════════════════════════════════════════ */
function downloadCheckedEmployeesDocument() {
    if (!uploadedTemplateArrayBuffer) {
        alert('1번 기본 Word 양식(.docx) 파일을 먼저 업로드해 주세요.');
        return;
    }
    const chks = document.querySelectorAll('.card-checkbox:checked');
    if (!chks.length) { alert('양식에 적용할 직원을 체크박스에서 선택해 주세요.'); return; }

    const selectedUsers = Array.from(chks)
        .map(c => globalUsersData[c.value])
        .filter(u => u && u.signature && u.signature !== '')
        .sort((a,b) => (a.timestamp||0) - (b.timestamp||0));

    if (!selectedUsers.length) { alert('선택된 인원 중 서명을 완료한 직원이 없습니다.'); return; }

    if (!insertPosition) {
        alert('미리보기에서 서명이 들어갈 셀을 먼저 클릭하여 삽입 위치를 지정해 주세요.');
        return;
    }

    document.getElementById('btnDownload').disabled = true;
    document.getElementById('spinnerDownload').style.display = 'block';

    // 원본 ArrayBuffer를 복사해서 사용 (원본 보존)
    const bufCopy = uploadedTemplateArrayBuffer.slice();

    patchDocxAndDownload(bufCopy, selectedUsers, insertPosition)
        .catch(err => alert('문서 생성 중 오류: ' + err.message))
        .finally(() => {
            document.getElementById('btnDownload').disabled = false;
            document.getElementById('spinnerDownload').style.display = 'none';
        });
}

/* ═══════════════════════════════════════════════
   핵심: JSZip으로 원본 docx XML 직접 수술
   - 원본 양식/폰트/스타일 100% 보존
   - 서명 셀: PNG 이미지 삽입
   - 이름 셀(서명 셀 왼쪽): 직원 이름 텍스트 삽입, 원본 rPr 속성 유지
═══════════════════════════════════════════════ */
async function patchDocxAndDownload(arrayBuffer, users, pos) {
    const zip = await JSZip.loadAsync(arrayBuffer);

    /* 1. word/document.xml 읽기 */
    const docXmlStr = await zip.file('word/document.xml').async('string');
    const parser    = new DOMParser();
    const xmlDoc    = parser.parseFromString(docXmlStr, 'application/xml');

    const NS = {
        w:   'http://schemas.openxmlformats.org/wordprocessingml/2006/main',
        wp:  'http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing',
        a:   'http://schemas.openxmlformats.org/drawingml/2006/main',
        pic: 'http://schemas.openxmlformats.org/drawingml/2006/picture',
        r:   'http://schemas.openxmlformats.org/officeDocument/2006/relationships',
        xlink: 'http://www.w3.org/1999/xlink'
    };

    /* 2. 대상 테이블의 모든 <w:tc> 선형 수집 */
    const allTables = xmlDoc.getElementsByTagNameNS(NS.w, 'tbl');
    const targetTbl = allTables[pos.tableIdx];
    if (!targetTbl) throw new Error(`테이블 인덱스 ${pos.tableIdx}를 찾을 수 없습니다.`);

    // 행 단위 수집: pos.colIdx 고정, pos.rowIdx 이후 행마다 해당 열 셀 수집
    const allRows = targetTbl.getElementsByTagNameNS(NS.w, 'tr');

    const cellsToFill = []; // { sigCell, nameCell, dateCell }

    for (let rIdx = pos.rowIdx; rIdx < allRows.length; rIdx++) {
        const row = allRows[rIdx];
        // <w:tr> 직계 자식 <w:tc>만 선택 (중첩 테이블 방지)
        const tcs = Array.from(row.childNodes).filter(n => n.localName === 'tc');
        if (pos.colIdx >= tcs.length) continue; // 이 행에 해당 열 없으면 건너뜀

        const sigCell  = tcs[pos.colIdx];
        const nameCell = pos.colIdx > 0                  ? tcs[pos.colIdx - 1] : null;
        const dateCell = pos.colIdx + 1 < tcs.length     ? tcs[pos.colIdx + 1] : null;
        cellsToFill.push({ sigCell, nameCell, dateCell });
    }

    if (!cellsToFill.length) throw new Error('지정 위치 이후 행을 찾을 수 없습니다.');

    /* 3. word/_rels/document.xml.rels 읽기 */
    const relsPath   = 'word/_rels/document.xml.rels';
    const relsXmlStr = await zip.file(relsPath).async('string');
    const relsDoc    = parser.parseFromString(relsXmlStr, 'application/xml');
    const relsRoot   = relsDoc.documentElement;

    /* 4. [Content_Types].xml에 png 타입 등록 확인 */
    const ctPath   = '[Content_Types].xml';
    let ctXmlStr   = await zip.file(ctPath).async('string');
    if (!ctXmlStr.includes('image/png')) {
        ctXmlStr = ctXmlStr.replace('</Types>', '<Default Extension="png" ContentType="image/png"/></Types>');
        zip.file(ctPath, ctXmlStr);
    }

    /* 5. 기존 rId 최대값 파악 (충돌 방지) */
    const existingIds = Array.from(relsRoot.getElementsByTagName('Relationship'))
        .map(r => parseInt((r.getAttribute('Id') || '').replace(/\D/g, '')) || 0);
    let nextRIdNum = Math.max(0, ...existingIds) + 100; // 100번대부터 시작해 충돌 방지

    /* 6. 셀별 이미지 삽입 + 이름 기입 */
    const fillCount = Math.min(cellsToFill.length, users.length);

    for (let i = 0; i < fillCount; i++) {
        const { sigCell, nameCell, dateCell } = cellsToFill[i];
        const user = users[i];

        /* ── 6a. 서명 이미지 PNG → 바이너리 → zip 저장 ── */
        const base64 = user.signature.split(',')[1];
        const imgBin = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const imgFilename = `sig_${i}.png`;
        const imgPath     = `word/media/${imgFilename}`;
        zip.file(imgPath, imgBin);

        /* ── 6b. relationship 등록 ── */
        const rId = `rIdSig${nextRIdNum++}`;
        const relEl = relsDoc.createElement('Relationship');
        relEl.setAttribute('Id', rId);
        relEl.setAttribute('Type', 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image');
        relEl.setAttribute('Target', `media/${imgFilename}`);
        relsRoot.appendChild(relEl);

        /* ── 6c. 서명 셀 <w:tc> 내부를 이미지 Drawing으로 교체 ── */
        // 셀 속성(<w:tcPr>)은 보존, <w:p> 이하만 교체
        const tcPr = sigCell.getElementsByTagNameNS(NS.w, 'tcPr')[0];

        // 셀 너비로 이미지 크기 추정 (EMU 단위; 914400 EMU = 1 inch)
        // 기본 90pt x 30pt → 1143000 x 381000 EMU
        const EMU_W = 1143000;
        const EMU_H = 381000;

        // "텍스트 뒤(Behind Text)" 레이아웃:
        // wp:anchor + behindDoc="1" + wrapNone
        // layoutInCell="1" 으로 표 셀 안에서도 정상 동작
        const drawingXml = `<w:p xmlns:w="${NS.w}"><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:drawing xmlns:wp="${NS.wp}"><wp:anchor distT="0" distB="0" distL="0" distR="0" simplePos="0" relativeHeight="251658240" behindDoc="1" locked="0" layoutInCell="1" allowOverlap="1"><wp:simplePos x="0" y="0"/><wp:positionH relativeFrom="column"><wp:posOffset>0</wp:posOffset></wp:positionH><wp:positionV relativeFrom="paragraph"><wp:posOffset>0</wp:posOffset></wp:positionV><wp:extent cx="${EMU_W}" cy="${EMU_H}"/><wp:effectExtent l="0" t="0" r="0" b="0"/><wp:wrapNone/><wp:docPr id="${i+1}" name="sig${i}"/><wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="${NS.a}" noChangeAspect="1"/></wp:cNvGraphicFramePr><a:graphic xmlns:a="${NS.a}"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="${NS.pic}"><pic:nvPicPr><pic:cNvPr id="${i+1}" name="sig${i}"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="${rId}" xmlns:r="${NS.r}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${EMU_W}" cy="${EMU_H}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:anchor></w:drawing></w:r></w:p>`;

        // 기존 <w:p> 제거 후 새 단락 삽입
        Array.from(sigCell.getElementsByTagNameNS(NS.w, 'p')).forEach(p => p.parentNode.removeChild(p));
        const newPara = parser.parseFromString(drawingXml, 'application/xml').documentElement;
        if (tcPr) sigCell.insertBefore(newPara, tcPr.nextSibling);
        else      sigCell.appendChild(newPara);

        /* ── 6d. 이름 셀(왼쪽): 원본 rPr 보존하며 텍스트만 이름으로 교체 ── */
        if (nameCell) {
            // 원본 <w:rPr> 추출 (첫번째 <w:r>의 것 사용)
            const origRuns = nameCell.getElementsByTagNameNS(NS.w, 'r');
            let rPrXml = '';
            if (origRuns.length > 0) {
                const origRPr = origRuns[0].getElementsByTagNameNS(NS.w, 'rPr')[0];
                if (origRPr) rPrXml = origRPr.outerHTML || new XMLSerializer().serializeToString(origRPr);
            }

            // 기존 <w:p> 내 텍스트 런 제거 후 이름 런 삽입
            const namePsArr = Array.from(nameCell.getElementsByTagNameNS(NS.w, 'p'));
            if (namePsArr.length > 0) {
                const firstP = namePsArr[0];
                // pPr(단락속성)는 보존, 나머지 r, hyperlink 제거
                Array.from(firstP.childNodes)
                    .filter(n => n.localName === 'r' || n.localName === 'hyperlink' || n.localName === 'del' || n.localName === 'ins')
                    .forEach(n => firstP.removeChild(n));

                // 이름 런 추가
                const nameRunXml = `<w:r xmlns:w="${NS.w}">${rPrXml}<w:t xml:space="preserve">${escapeXml(user.name)}</w:t></w:r>`;
                const nameRunEl  = parser.parseFromString(`<root xmlns:w="${NS.w}">${nameRunXml}</root>`, 'application/xml').documentElement.firstChild;
                firstP.appendChild(nameRunEl);
                applyCenter(firstP, NS, parser);

                // 다른 <w:p>는 제거 (첫 번째만 남김)
                namePsArr.slice(1).forEach(p => p.parentNode && p.parentNode.removeChild(p));
            }
        }

        /* ── 6e. 날짜 셀(서명 셀 오른쪽): 원본 rPr 보존하며 날짜 텍스트 삽입 ── */
        if (dateCell) {
            const d = user.timestamp ? new Date(user.timestamp) : new Date();
            const dateStr = `${d.getMonth()+1}/${d.getDate()}`;

            // 원본 rPr 추출
            const dateRuns = dateCell.getElementsByTagNameNS(NS.w, 'r');
            let dateRPrXml = '';
            if (dateRuns.length > 0) {
                const dateRPr = dateRuns[0].getElementsByTagNameNS(NS.w, 'rPr')[0];
                if (dateRPr) dateRPrXml = new XMLSerializer().serializeToString(dateRPr);
            }

            const datePsArr = Array.from(dateCell.getElementsByTagNameNS(NS.w, 'p'));
            if (datePsArr.length > 0) {
                const firstP = datePsArr[0];
                Array.from(firstP.childNodes)
                    .filter(n => n.localName === 'r' || n.localName === 'hyperlink' || n.localName === 'del' || n.localName === 'ins')
                    .forEach(n => firstP.removeChild(n));

                const dateRunXml = `<w:r xmlns:w="${NS.w}">${dateRPrXml}<w:t xml:space="preserve">${escapeXml(dateStr)}</w:t></w:r>`;
                const dateRunEl  = parser.parseFromString(`<root xmlns:w="${NS.w}">${dateRunXml}</root>`, 'application/xml').documentElement.firstChild;
                firstP.appendChild(dateRunEl);
                applyCenter(firstP, NS, parser);
                datePsArr.slice(1).forEach(p => p.parentNode && p.parentNode.removeChild(p));
            }
        }
    }

    /* 7. 수정된 rels 저장 */
    const serializer = new XMLSerializer();
    zip.file(relsPath, serializer.serializeToString(relsDoc));

    /* 8. 수정된 document.xml 저장 */
    zip.file('word/document.xml', serializer.serializeToString(xmlDoc));

    /* 9. Blob 생성 → 다운로드 */
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.style.display = 'none';
    a.href     = url;
    a.download = '서명양식_완성본.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

/* ── 단락에 가운데 정렬(<w:jc w:val="center"/>) 강제 적용 ──
   <w:pPr>가 있으면 기존 <w:jc>를 교체, 없으면 pPr 생성해서 삽입 */
function applyCenter(para, NS, parser) {
    let pPr = para.getElementsByTagNameNS(NS.w, 'pPr')[0];
    if (!pPr) {
        // pPr 없으면 새로 만들어서 단락 맨 앞에 삽입
        const pPrEl = parser.parseFromString(
            `<w:pPr xmlns:w="${NS.w}"><w:jc w:val="center"/></w:pPr>`,
            'application/xml'
        ).documentElement;
        para.insertBefore(pPrEl, para.firstChild);
    } else {
        // 기존 jc 제거 후 center 삽입
        const oldJc = pPr.getElementsByTagNameNS(NS.w, 'jc')[0];
        if (oldJc) pPr.removeChild(oldJc);
        const jcEl = parser.parseFromString(
            `<w:jc xmlns:w="${NS.w}" w:val="center"/>`,
            'application/xml'
        ).documentElement;
        pPr.appendChild(jcEl);
    }
}

function escapeXml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}
</script>
</body>
</html>
